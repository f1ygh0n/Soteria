<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>{{ page_title or "Soteria" }}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/global.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/dashboard.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/scan.css') }}">

</head>

<body>

<div class="app-layout">

    {% include "components/sidebar.html" %}

    <main class="main-content">

        {% include "components/topbar.html" %}

        {% block page_content %}
        {% endblock %}

    </main>

</div>

<script>
window.APP_PAGES = [

    {
        name: "Dashboard",
        description: "Overview of your cybersecurity tools.",
        keywords: ["dashboard", "home"],
        url: "{{ url_for('home.dashboard') }}"
    },

    {
        name: "Email Scanner",
        description: "Analyze suspicious emails using AI.",
        keywords: ["email", "mail", "gmail", "scanner"],
        url: "{{ url_for('email.email') }}"
    },

    {
        name: "Website Checker",
        description: "Analyze URLs for phishing and scams.",
        keywords: ["website", "url", "domain", "link", "phishing"],
        url: "{{ url_for('website.website') }}"
    },

    {
        name: "Chat Detector",
        description: "Detect scams in chats and conversations.",
        keywords: ["chat", "message"],
        url: "{{ url_for('chat.chat') }}"
    },

    {
        name: "Password Analyzer",
        description: "Coming Soon",
        keywords: ["password"],
        url: "#"
    },

    {
        name: "Deepfake Detector",
        description: "Coming Soon",
        keywords: ["deepfake", "image"],
        url: "#"
    },

    {
        name: "Privacy Scanner",
        description: "Coming Soon",
        keywords: ["privacy"],
        url: "#"
    },

    {
        name: "History",
        description: "View previous scans.",
        keywords: ["history", "activity"],
        url: "#"
    },

    {
        name: "Settings",
        description: "Application settings.",
        keywords: ["settings", "preferences"],
        url: "#"
    }

];
</script>

<script src="{{ url_for('static', filename='js/search.js') }}"></script>
<script src="{{ url_for('static', filename='js/loading.js') }}"></script>

{% block scripts %}
{% endblock %}

</body>
</html>
