<header class="topbar">

    <div>

        <h2>{{ page_title }}</h2>

        <p>{{ page_subtitle }}</p>

    </div>

    <div class="topbar-actions">

        <div class="search-box">

            <input id="globalSearch" type="text" placeholder="Search Soteria...">

            <div id="searchDropdown" class="search-dropdown hidden"></div>

        </div>

        <button class="icon-button">

            <img src="{{ url_for('static', filename='images/icons/bell.svg') }}"
                 alt="Notifications">

        </button>

        <button class="icon-button">

            <img src="{{ url_for('static', filename='images/icons/user.svg') }}"
                 alt="Profile">

        </button>

    </div>

</header>
